<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ГосМузыка Макс</title>
    <link rel="stylesheet" href="pipirka.css">
</head>
<body>
    <!-- ШАПКА -->
    <div class="header">
        <div class="logo">ГосМузыка Макс</div>
        <div class="header-controls">
            <div class="search-bar">
                <input type="text" class="search-input" placeholder="Поиск треков, исполнителей...">
                <button class="search-btn"><i class="fas fa-search"></i></button>
            </div>
        </div>
    </div>

    <!-- БОКОВОЕ МЕНЮ -->
    <nav class="sidebar">
        <a href="#" class="menu-item active"><i class="fas fa-home"></i>Главная</a>
        <a href="#" class="menu-item"><i class="fas fa-heart"></i>Избранное</a>
        <a href="#" class="menu-item"><i class="fas fa-music"></i>Недавно прослушано</a>
        <a href="#" class="menu-item"><i class="fas fa-chart-line"></i>Подборки</a>
        <a href="#" class="menu-item"><i class="fas fa-podcast"></i>Подкасты</a>
    </nav>

    <!-- ГЛАВНЫЙ КОНТЕНТ -->
    <main class="main-content">
        <div class="section-header">
            <div class="section-title">Популярные плейлисты</div>
            <button class="control-btn"><i class="fas fa-ellipsis-h"></i></button>
        </div>
        
        <div class="playlists-grid">
            <div class="playlist-card">
                <div class="playlist-cover"></div>
                <div class="playlist-title">Рок для работы</div>
                <div class="playlist-tracks">145 треков • 8ч 23м</div>
            </div>
            <div class="playlist-card">
                <div class="playlist-cover"></div>
                <div class="playlist-title">Электронная музыка</div>
                <div class="playlist-tracks">89 треков • 5ч 12м</div>
            </div>
            <div class="playlist-card">
                <div class="playlist-cover"></div>
                <div class="playlist-title">Русский рэп</div>
                <div class="playlist-tracks">212 треков • 11ч 45м</div>
            </div>
            <div class="playlist-card">
                <div class="playlist-cover"></div>
                <div class="playlist-title">Летние хиты</div>
                <div class="playlist-tracks">67 треков • 3ч 18м</div>
            </div>
        </div>
    </main>

    <!-- ПЛЕЕР -->
    <div class="player">
        <div class="track-info">
            <div class="track-cover"></div>
            <div class="track-details">
                <h3>Imagine Dragons</h3>
                <p>Believer</p>
            </div>
        </div>

        <div class="player-controls">
            <button class="control-btn"><i class="fas fa-random"></i></button>
            <button class="control-btn"><i class="fas fa-step-backward"></i></button>
            <button class="control-btn play-pause"><i class="fas fa-play"></i></button>
            <button class="control-btn"><i class="fas fa-step-forward"></i></button>
            <button class="control-btn"><i class="fas fa-redo"></i></button>
        </div>

        <div class="progress-container">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="time-display">
                <span>2:34</span>
                <span>4:12</span>
            </div>
        </div>

        <div class="volume-control">
            <button class="control-btn"><i class="fas fa-volume-up"></i></button>
            <div class="volume-bar"></div>
        </div>
    </div>

    <script>
        // Интерактивность плеера
        const playBtn = document.querySelector('.play-pause');
        const progressFill = document.querySelector('.progress-fill');
        
        playBtn.addEventListener('click', () => {
            const icon = playBtn.querySelector('i');
            if (icon.classList.contains('fa-play')) {
                icon.classList.remove('fa-play');
                icon.classList.add('fa-pause');
            } else {
                icon.classList.remove('fa-pause');
                icon.classList.add('fa-play');
            }
        });

        // Анимация прогресса
        setInterval(() => {
            const currentWidth = parseFloat(progressFill.style.width) || 40;
            const newWidth = Math.min(currentWidth + 0.5, 95);
            progressFill.style.width = newWidth + '%';
        }, 300);
    </script>
</body>
</html>
